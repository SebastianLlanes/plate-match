<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>ChapaMatch — Alguien la tiene. Nosotros los conectamos.</title>
    <meta name="description" content="Perdiste tu chapa patente o encontraste una? ChapaMatch conecta a quienes perdieron su patente con quienes la encontraron." />
    <meta name="theme-color" content="#111827" />

    <meta property="og:title" content="ChapaMatch" />
    <meta property="og:description" content="Alguien la tiene. Nosotros los conectamos." />
    <meta property="og:type" content="website" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChapaMatch" />

    <style>
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
    <script>
      if (location.hostname === "localhost") {
        self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
      }
    </script>
  </head>
  <body>

    <!-- Splash: visible antes de que React cargue -->
    <div id="splash" style="
      position:fixed;inset:0;background:#ffffff;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:20px;z-index:9999;
      transition:opacity 0.4s ease,visibility 0.4s ease;
    ">
      <svg width="220" height="40" viewBox="0 0 220 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="62" height="40" rx="5" fill="#111827"/>
        <text x="31" y="15" text-anchor="middle" dominant-baseline="central"
          font-family="'Courier New',monospace" font-size="10" font-weight="700"
          fill="#ffffff" letter-spacing="2">ABC</text>
        <text x="31" y="29" text-anchor="middle" dominant-baseline="central"
          font-family="'Courier New',monospace" font-size="10" font-weight="700"
          fill="#10b981" letter-spacing="2">123</text>
        <circle cx="52" cy="7" r="6" fill="#10b981"/>
        <path d="M49 7 L52 10 L56 4" fill="none" stroke="#ffffff"
          stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="74" y="27" font-family="system-ui,-apple-system,sans-serif"
          font-size="22" font-weight="700" fill="#111827" letter-spacing="-1">Chapa</text>
        <text x="148" y="27" font-family="system-ui,-apple-system,sans-serif"
          font-size="22" font-weight="700" fill="#10b981" letter-spacing="-1">Match</text>
      </svg>

      <div style="width:160px;height:3px;background:#f3f4f6;border-radius:999px;overflow:hidden">
        <div style="
          height:100%;width:40%;
          background:linear-gradient(90deg,#111827 0%,#10b981 100%);
          border-radius:999px;
          animation:slide 1.2s ease-in-out infinite;
        "></div>
      </div>
      <p style="
        position:absolute;bottom:32px;
        margin:0;font-family:system-ui,-apple-system,sans-serif;
        font-size:14px;color:#9ca3af;text-align:center;line-height:1.8;
      ">
        Powered by <strong style="color:#111827">Sebastián Llanes</strong><br>
        <span style="letter-spacing:0.3px">Click. Scroll. Wow.</span>
      </p>
      </div>

    <div id="root"></div>

    <script>
      window.__hideSplash = function() {
        var s = document.getElementById("splash");
        if (!s) return;
        s.style.opacity = "0";
        s.style.visibility = "hidden";
        setTimeout(function() { s.remove(); }, 400);
      };
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
